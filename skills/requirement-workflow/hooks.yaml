# IDE Hooks Configuration — requirement-workflow v5
#
# Generated by `node scripts/cli.cjs hooks generate -r <project>`.
# Installed by   `node scripts/cli.cjs hooks install  -r <project>`.
#
# v5 ships TWO hooks (down from three in v4 — the no-op PostToolUse was dropped):
#
#   SessionStart  → reads .trae/active_workflow + state.json,
#                   prints active phase + brief path so the AI starts
#                   each session with the right context.
#
#   Stop          → blocks premature stopping when the workflow is in
#                   IMPLEMENTING (and tasks.md is empty) or TESTING
#                   (always — the user must explicitly close TESTING).
#
# Phase-agent mapping is no longer YAML-driven. It now lives in
# src/requirement-workflow/lib/phases.ts as a typed contract; each
# phase declares its default + optional agents there, and the CLI
# surfaces them in the per-phase brief and `cli.cjs status`.
#
# To add a project-specific override, edit phases.ts in a fork or
# wrap the brief generator — there is no global YAML registry to
# maintain anymore.
ide_hooks:
  SessionStart:
    description: "Inject active workflow phase + brief path into session context."
    timeout: 5
  Stop:
    description: "Block stopping during IMPLEMENTING/TESTING when artifacts are incomplete."
    loop_limit: 3
    timeout: 10
